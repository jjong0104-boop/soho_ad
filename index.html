<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장마켓 - 매장 통신 통합 컨설팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #1a4f94;
            --accent-pink: #ff4081;
            --bg-gray: #f2f5f8;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; padding: 20px; color: #333; }
        .form-container { background: white; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        
        /* 헤더 디자인: 로고 이미지 반영 및 최적화 */
        .header { background: linear-gradient(135deg, #1a4f94 0%, #0d2e5c 100%); color: white; padding: 45px 20px; text-align: center; }
        .header h1 { font-size: 1.35rem; margin-top: 18px; line-height: 1.5; word-break: keep-all; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .logo { width: 160px; height: auto; display: block; margin: 0 auto; } /* 로고 크기 및 중앙 정렬 */

        /* 단계별 폼 스타일 */
        .step { display: none; padding: 35px 25px; animation: slideIn 0.4s ease-out; }
        .step.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .question { font-weight: 700; font-size: 1.2rem; margin-bottom: 30px; line-height: 1.4; color: #1a4f94; }
        .options-grid { display: grid; gap: 14px; }
        
        /* 버튼 스타일 */
        input[type="radio"], input[type="checkbox"] { display: none; }
        label.option-btn {
            display: block; padding: 20px; border: 2px solid #e0e6ed; border-radius: 12px;
            text-align: center; cursor: pointer; transition: 0.2s; font-weight: 500; background: #fff; font-size: 1rem;
        }
        input:checked + label.option-btn { border-color: var(--main-blue); background: #f0f7ff; color: var(--main-blue); font-weight: 700; box-shadow: 0 4px 10px rgba(26, 79, 148, 0.1); }
        
        input[type="text"], input[type="tel"] {
            width: 100%; padding: 18px; margin-bottom: 14px; border: 2px solid #e0e6ed; border-radius: 12px; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus, input[type="tel"]:focus { border-color: var(--main-blue); }
        
        .next-btn {
            width: 100%; background: var(--accent-pink); color: white; border: none; padding: 20px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 700; margin-top: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.3);
        }

        /* 팝업 디자인 */
        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 45px 35px; border-radius: 25px; text-align: center;
            width: 85%; max-width: 340px; animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-content h2 { color: var(--main-blue); margin-top: 0; font-size: 1.6rem; margin-bottom: 15px; }
        .modal-content p { line-height: 1.7; color: #555; font-weight: 500; font-size: 1rem; }
        .modal-btn {
            background: var(--main-blue); color: white; border: none; padding: 15px 35px;
            border-radius: 12px; margin-top: 25px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem;
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <img src="image_0.png" alt="사장마켓" class="logo">
        <h1>매장 인터넷+전화 가입하면<br>최대 사은품 증정!</h1>
    </div>

    <form id="sajangForm">
        <div class="step active" id="step1">
            <p class="question">Q1. 매장 오픈 예정이신가요,<br>운영중이신가요?</p>
            <div class="options-grid">
                <input type="radio" name="status" id="op1" value="오픈 예정" onclick="nextStep(2)">
                <label for="op1" class="option-btn">오픈 예정</label>
                <input type="radio" name="status" id="op2" value="운영중" onclick="nextStep(2)">
                <label for="op2" class="option-btn">운영중</label>
            </div>
        </div>

        <div class="step" id="step2">
            <p class="question">Q2. 매장에 필요하신 상품을<br>모두 체크해 주세요! (복수 선택)</p>
            <div class="options-grid">
                <input type="checkbox" name="products" id="p1" value="포스기"><label for="p1" class="option-btn">포스기</label>
                <input type="checkbox" name="products" id="p2" value="카드단말기"><label for="p2" class="option-btn">카드단말기(토스/네이버)</label>
                <input type="checkbox" name="products" id="p3" value="CCTV"><label for="p3" class="option-btn">CCTV</label>
                <input type="checkbox" name="products" id="p4" value="정수기"><label for="p4" class="option-btn">정수기</label>
                <input type="checkbox" name="products" id="p5" value="테이블오더"><label for="p5" class="option-btn">테이블오더</label>
            </div>
            <button type="button" class="next-btn" onclick="nextStep(3)">다음으로</button>
        </div>

        <div class="step" id="step3">
            <p class="question">마지막입니다!<br>연락처를 남겨주세요.</p>
            <input type="text" name="storeName" id="storeName" placeholder="상호명 (오픈예정 시 '오픈예정' 입력)" required>
            <input type="text" name="userName" id="userName" placeholder="성함" required>
            <input type="tel" name="phone" id="phone" placeholder="전화번호 (-없이 입력)" required>
            
            <p style="margin-top:30px; font-size:0.95rem; color:#666; font-weight: bold;">마케팅 활용 및 이용 동의 (선택)</p>
            <div class="options-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 15px;">
                <input type="radio" name="marketing" id="m1" value="동의" checked><label for="m1" class="option-btn">동의합니다</label>
                <input type="radio" name="marketing" id="m2" value="미동의"><label for="m2" class="option-btn">거부</label>
            </div>
            
            <button type="submit" class="next-btn" id="submitBtn">최종 신청하기</button>
            <p style="font-size: 0.85rem; color: #999; margin-top: 18px; text-align: center;">담당 상담원이 빠른 시간 내에 연락 드리겠습니다.</p>
        </div>
    </form>
</div>

<div id="customModal">
    <div class="modal-content">
        <h2>사장마켓</h2>
        <p>문의가 접수되었습니다.<br>빠른 시일 내에 연락드리겠습니다.</p>
        <button class="modal-btn" onclick="closeModal()">확인</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxIoIApIRXDzSG5EzG7c03HI6TH6bvZWdqRfiGfZrAYYLNA0LSBpu6kBExlz-JtiWrrIA/exec'; // 배포된 앱스크립트 웹 앱 URL 붙여넣기
    const form = document.getElementById('sajangForm');

    function nextStep(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        window.scrollTo(0,0);
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // 필수값 검증 로직
        const store = document.getElementById('storeName').value.trim();
        const user = document.getElementById('userName').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if(!store || !user || !phone) {
            alert('필수 정보를 모두 입력해주세요.');
            return;
        }

        // 데이터 처리
        let products = [];
        document.querySelectorAll('input[name="products"]:checked').forEach(cb => products.push(cb.value));
        
        let formData = new FormData(form);
        formData.set('products', products.join(', '));
        formData.set('callTime', '미지정'); // 기존 스프레드시트 호환용

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "전송 중...";
        submitBtn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => {
                document.getElementById('customModal').style.display = 'flex';
                form.reset();
            })
            .catch(error => {
                alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                submitBtn.innerText = "최종 신청하기";
                submitBtn.disabled = false;
            });
    });

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
        location.reload(); 
    }
</script>

</body>
</html>
