<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장마켓 - 매장 통신 통합 컨설팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 캡처 이미지의 진한 오렌지 색상 반영 */
            --main-orange: #ff6b00; 
            --light-orange: #fff8f4;
            --bg-gray: #f2f5f8;
            --text-dark: #333333;
        }

        /* 전체 배경: 깔끔한 오렌지 단색 배경 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--main-orange);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 50px 20px;
            box-sizing: border-box;
        }

        /* 메인 컨테이너: 둥근 모서리 화이트 카드 스타일 */
        .form-container {
            background: white;
            width: 100%;
            max-width: 460px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 💥 헤더 디자인: 요청하신 대로 오렌지 배경 적용 */
        .header {
            background-color: var(--main-orange);
            padding: 45px 20px;
            text-align: center;
        }
        .logo {
            width: 170px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .header h1 {
            font-size: 1.3rem;
            color: white; /* 오렌지 배경 위에 흰색 글씨 */
            line-height: 1.5;
            margin-top: 15px;
            margin-bottom: 0;
            word-break: keep-all;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15); /* 글씨 가독성 향상 */
        }

        /* 구분선 */
        .divider {
            height: 3px;
            background-color: #fff; /* 오렌지 배경 위 흰색 선 */
            width: 100%;
            margin: 0;
        }

        /* 질문 단계 스타일 */
        .step { display: none; padding: 40px 25px 50px; }
        .step.active { display: block; }

        .question {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 30px;
            line-height: 1.4;
            color: var(--text-dark);
        }

        .options-grid { display: grid; gap: 14px; }

        /* 라디오/체크박스 커스텀 버튼 스타일: 💥 오렌지 톤으로 변경 */
        input[type="radio"], input[type="checkbox"] { display: none; }
        label.option-btn {
            display: block;
            padding: 19px;
            border: 2px solid #e5eaef; /* 기본 테두리 */
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: var(--text-dark);
            background: #fff;
            font-size: 1rem;
        }
        /* 체크 시: 💥 오렌지색 적용 */
        input:checked + label.option-btn {
            border-color: var(--main-orange);
            background: var(--light-orange);
            color: var(--main-orange);
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.1);
        }

        /* 입력창 스타일 */
        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 18px;
            margin-bottom: 14px;
            border: 2px solid #e1e8ee;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]:focus, input[type="tel"]:focus {
            border-color: var(--main-orange);
        }

        /* 다음/신청 버튼 스타일: 💥 오렌지색 적용 */
        .next-btn {
            width: 100%;
            background: var(--main-orange);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.2);
            transition: all 0.2s;
        }
        .next-btn:active { transform: scale(0.98); }

        /* 팝업 모달 스타일: 💥 오렌지 테마 반영 */
        #customModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 45px 35px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .check-circle {
            width: 60px;
            height: 60px;
            border: 3px solid var(--main-orange);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: var(--main-orange);
            font-size: 30px;
            font-weight: bold;
        }
        .modal-content h2 { color: var(--text-dark); margin-bottom: 12px; font-size: 1.5rem; margin-top: 0; }
        .modal-content p { color: #666; margin-bottom: 30px; line-height: 1.7; font-size: 1rem; }
        .modal-btn {
            background: var(--main-orange);
            color: white;
            border: none;
            padding: 16px 0;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <img src="image_0.png" alt="사장마켓" class="logo">
        <h1>매장 인터넷+전화 가입하면<br>최대 사은품 증정!</h1>
    </div>
    
    <div class="divider"></div>

    <form id="sajangForm">
        <div class="step active" id="step1">
            <p class="question">Q1. 매장 오픈 예정이신가요,<br>운영중이신가요?</p>
            <div class="options-grid">
                <input type="radio" name="status" id="op1" value="오픈 예정" onclick="nextStep(2)">
                <label for="op1" class="option-btn">오픈 예정</label>
                <input type="radio" name="status" id="op2" value="운영중" onclick="nextStep(2)">
                <label for="op2" class="option-btn">운영중</label>
            </div>
        </div>

        <div class="step" id="step2">
            <p class="question">Q2. 매장에 필요하신 상품을<br>모두 선택해 주세요! (복수 선택)</p>
            <div class="options-grid">
                <input type="checkbox" name="products" id="p1" value="포스기"><label for="p1" class="option-btn">포스기</label>
                <input type="checkbox" name="products" id="p2" value="카드단말기"><label for="p2" class="option-btn">카드단말기(토스/네이버)</label>
                <input type="checkbox" name="products" id="p3" value="CCTV"><label for="p3" class="option-btn">CCTV</label>
                <input type="checkbox" name="products" id="p4" value="정수기"><label for="p4" class="option-btn">정수기</label>
                <input type="checkbox" name="products" id="p5" value="테이블오더"><label for="p5" class="option-btn">테이블오더</label>
            </div>
            <button type="button" class="next-btn" onclick="nextStep(3)">다음으로</button>
        </div>

        <div class="step" id="step3">
            <p class="question">마지막입니다!<br>연락처를 남겨주세요.</p>
            <input type="text" name="storeName" id="storeName" placeholder="상호명 (오픈예정 시 '오픈예정' 입력)" required>
            <input type="text" name="userName" id="userName" placeholder="성함" required>
            <input type="tel" name="phone" id="phone" placeholder="전화번호 (-없이 입력)" required>
            
            <p style="margin-top:25px; font-size:0.9rem; color:#666; font-weight: bold;">마케팅 활용 및 이용 동의 (선택)</p>
            <div class="options-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 10px;">
                <input type="radio" name="marketing" id="m1" value="동의" checked><label for="m1" class="option-btn">동의합니다</label>
                <input type="radio" name="marketing" id="m2" value="미동의"><label for="m2" class="option-btn">거부</label>
            </div>
            
            <button type="submit" class="next-btn" id="submitBtn">상담 신청하기</button>
        </div>
    </form>
</div>

<div id="customModal">
    <div class="modal-content">
        <div class="check-circle">✓</div>
        <h2>사장마켓</h2>
        <p>문의가 접수되었습니다.<br>빠른 시일 내에 연락드리겠습니다!</p>
        <button class="modal-btn" onclick="closeModal()">확인</button>
    </div>
</div>

<script>
    // 본인의 앱스크립트 URL로 꼭 교체하세요.
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxIoIApIRXDzSG5EzG7c03HI6TH6bvZWdqRfiGfZrAYYLNA0LSBpu6kBExlz-JtiWrrIA/exec'; 
    const form = document.getElementById('sajangForm');

    function nextStep(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        window.scrollTo(0,0);
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        const store = document.getElementById('storeName').value.trim();
        const user = document.getElementById('userName').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if(!store || !user || !phone) {
            alert('필수 정보를 입력해주세요.');
            return;
        }

        let products = [];
        document.querySelectorAll('input[name="products"]:checked').forEach(cb => products.push(cb.value));
        
        let formData = new FormData(form);
        formData.set('products', products.join(', '));

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "전송 중...";
        submitBtn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => {
                document.getElementById('customModal').style.display = 'flex';
                form.reset();
            })
            .catch(error => {
                alert('전송 오류가 발생했습니다.');
                submitBtn.innerText = "상담 신청하기";
                submitBtn.disabled = false;
            });
    });

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
        location.reload(); 
    }
</script>

</body>
</html>
