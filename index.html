<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장마켓 - 매장 통신 통합 컨설팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #1a4f94;
            --accent-pink: #ff4081;
            --bg-gray: #f2f5f8;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; padding: 20px; color: #333; }
        .form-container { background: white; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        
        /* 헤더 디자인 (보내주신 시트 느낌 반영) */
        .header { background: linear-gradient(135deg, #1a4f94 0%, #0d2e5c 100%); color: white; padding: 40px 20px; text-align: center; }
        .header h1 { font-size: 1.3rem; margin-top: 15px; line-height: 1.5; word-break: keep-all; font-weight: 700; }
        .logo { width: 140px; }

        /* 단계별 폼 스타일 */
        .step { display: none; padding: 30px 25px; animation: slideIn 0.4s ease-out; }
        .step.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .question { font-weight: 700; font-size: 1.15rem; margin-bottom: 25px; line-height: 1.4; color: #1a4f94; }
        .options-grid { display: grid; gap: 12px; }
        
        /* 버튼 스타일 */
        input[type="radio"], input[type="checkbox"] { display: none; }
        label.option-btn {
            display: block; padding: 18px; border: 2px solid #e0e6ed; border-radius: 12px;
            text-align: center; cursor: pointer; transition: 0.2s; font-weight: 500; background: #fff;
        }
        input:checked + label.option-btn { border-color: var(--main-blue); background: #f0f7ff; color: var(--main-blue); font-weight: 700; box-shadow: 0 4px 10px rgba(26, 79, 148, 0.1); }
        
        input[type="text"], input[type="tel"] {
            width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #e0e6ed; border-radius: 12px; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus, input[type="tel"]:focus { border-color: var(--main-blue); }
        
        .next-btn {
            width: 100%; background: var(--accent-pink); color: white; border: none; padding: 18px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 700; margin-top: 10px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.3);
        }

        /* 커스텀 팝업 스타일 */
        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 40px 30px; border-radius: 20px; text-align: center;
            width: 80%; max-width: 320px; animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-content h2 { color: var(--main-blue); margin-top: 0; font-size: 1.5rem; }
        .modal-content p { line-height: 1.6; color: #666; font-weight: 500; }
        .modal-btn {
            background: var(--main-blue); color: white; border: none; padding: 12px 30px;
            border-radius: 10px; margin-top: 20px; font-weight: 700; cursor: pointer; width: 100%;
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <img src="logo.png" alt="사장마켓" class="logo">
        <h1>매장 인터넷+전화 가입하면<br>최대 사은품 증정!</h1>
    </div>

    <form id="sajangForm">
        <div class="step active" id="step1">
            <p class="question">Q1. 매장 오픈 예정이신가요,<br>운영중이신가요?</p>
            <div class="options-grid">
                <input type="radio" name="status" id="op1" value="오픈 예정" onclick="nextStep(2)">
                <label for="op1" class="option-btn">오픈 예정</label>
                <input type="radio" name="status" id="op2" value="운영중" onclick="nextStep(2)">
                <label for="op2" class="option-btn">운영중</label>
            </div>
        </div>

        <div class="step" id="step2">
            <p class="question">Q2. 매장에 필요하신 상품을<br>모두 체크해 주세요! (복수 선택)</p>
            <div class="options-grid">
                <input type="checkbox" name="products" id="p1" value="포스기"><label for="p1" class="option-btn">포스기</label>
                <input type="checkbox" name="products" id="p2" value="카드단말기"><label for="p2" class="option-btn">카드단말기(토스/네이버)</label>
                <input type="checkbox" name="products" id="p3" value="CCTV"><label for="p3" class="option-btn">CCTV</label>
                <input type="checkbox" name="products" id="p4" value="정수기"><label for="p4" class="option-btn">정수기</label>
                <input type="checkbox" name="products" id="p5" value="테이블오더"><label for="p5" class="option-btn">테이블오더</label>
            </div>
            <button type="button" class="next-btn" onclick="nextStep(3)">다음으로</button>
        </div>

        <div class="step" id="step3">
            <p class="question">Q3. 연락처를 남겨주시면<br>빠르게 안내드릴게요!</p>
            <input type="text" name="storeName" id="storeName" placeholder="상호명 (오픈예정 시 '오픈예정' 입력)" required>
            <input type="text" name="userName" id="userName" placeholder="성함" required>
            <input type="tel" name="phone" id="phone" placeholder="전화번호 (-없이 입력)" required>
            <button type="button" class="next-btn" onclick="validateStep3()">다음으로</button>
            <p style="font-size: 0.8rem; color: #999; margin-top: 15px; text-align: center;">* 필수 항목입니다.</p>
        </div>

        <div class="step" id="step4">
            <p class="question">마지막입니다!<br>통화 가능 시간을 알려주세요.</p>
            <div class="options-grid">
                <input type="radio" name="callTime" id="t1" value="오전 09-12시" checked><label for="t1" class="option-btn">오전 09-12시</label>
                <input type="radio" name="callTime" id="t2" value="오후 12-15시"><label for="t2" class="option-btn">오후 12-15시</label>
                <input type="radio" name="callTime" id="t3" value="늦은 오후 15-19시"><label for="t3" class="option-btn">늦은 오후 15-19시</label>
            </div>
            
            <p style="margin-top:25px; font-size:0.9rem; color:#666;">마케팅 활용 동의 (선택)</p>
            <div class="options-grid" style="grid-template-columns: 1fr 1fr;">
                <input type="radio" name="marketing" id="m1" value="동의" checked><label for="m1" class="option-btn">동의</label>
                <input type="radio" name="marketing" id="m2" value="미동의"><label for="m2" class="option-btn">거부</label>
            </div>
            <button type="submit" class="next-btn" style="background: var(--main-blue); margin-top: 30px;">최종 신청하기</button>
        </div>
    </form>
</div>

<div id="customModal">
    <div class="modal-content">
        <h2>사장마켓</h2>
        <p>문의가 접수되었습니다.<br>빠른 시일 내에 연락드리겠습니다.</p>
        <button class="modal-btn" onclick="closeModal()">확인</button>
    </div>
</div>

<script>
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; // 여기에 앱스크립트 웹 앱 URL을 넣으세요.
    const form = document.getElementById('sajangForm');

    function nextStep(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        window.scrollTo(0,0);
    }

    // 질문 3 필수값 체크 함수
    function validateStep3() {
        const store = document.getElementById('storeName').value.trim();
        const user = document.getElementById('userName').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if(!store || !user || !phone) {
            alert('필수 항목을 모두 입력해주세요.');
            return;
        }
        nextStep(4);
    }

    // 최종 제출
    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // 체크박스 다중 선택 처리
        let products = [];
        document.querySelectorAll('input[name="products"]:checked').forEach(cb => products.push(cb.value));
        
        let formData = new FormData(form);
        formData.set('products', products.join(', '));

        // 로딩 표시 (버튼 비활성화)
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.innerText = "전송 중...";
        submitBtn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => {
                document.getElementById('customModal').style.display = 'flex';
                form.reset();
            })
            .catch(error => {
                alert('오류가 발생했습니다. 다시 시도해주세요.');
                submitBtn.innerText = "최종 신청하기";
                submitBtn.disabled = false;
            });
    });

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
        location.reload(); // 첫 페이지로 리셋
    }
</script>

</body>
</html>
